<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>PDF Tools - Velyon</title>

  <link rel="stylesheet" href="style.css">
  <link
rel="icon"
type="image/png"
href="assets/logo.png">

  <!-- PDF LIB -->

  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
</head>

<body>

  <!-- HEADER -->

  <header>

    <div class="logo">
      <img src="assets/logo.png" height="40">
      <span>Velyon</span>
    </div>

    <nav>
      <a href="index.html">Home</a>
      <a href="tools.html">Tools</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>

  </header>

  <!-- SECTION -->

  <section class="section">

    <h2>PDF Merger</h2>

    <div class="card contact-card">

      <p>
        Upload multiple PDF files and merge them instantly.
      </p>

      <div class="contact-form">

        <input
        type="file"
        id="pdfInput"
        accept=".pdf"
        multiple>

        <button
        class="tool-btn"
        onclick="mergePDFs()">

          Merge PDFs

        </button>

      </div>

      <div
      id="output"
      style="margin-top:30px; text-align:center;">
      </div>

    </div>

  </section>

  <!-- FOOTER -->

  <footer>
    © 2026 Velyon. All rights reserved.
  </footer>

  <!-- SCRIPT -->

  <script>

    async function mergePDFs(){

      const input =
      document.getElementById("pdfInput");

      const output =
      document.getElementById("output");

      const files =
      input.files;

      if(files.length < 2){

        output.innerHTML =
        "<p>Please upload at least 2 PDF files.</p>";

        return;
      }

      const mergedPdf =
      await PDFLib.PDFDocument.create();

      for(const file of files){

        const bytes =
        await file.arrayBuffer();

        const pdf =
        await PDFLib.PDFDocument.load(bytes);

        const pages =
        await mergedPdf.copyPages(
          pdf,
          pdf.getPageIndices()
        );

        pages.forEach((page) => {
          mergedPdf.addPage(page);
        });
      }

      const mergedBytes =
      await mergedPdf.save();

      const blob =
      new Blob(
        [mergedBytes],
        { type: "application/pdf" }
      );

      const url =
      URL.createObjectURL(blob);

      output.innerHTML = `
        <h3 style="margin-bottom:20px;">
          PDF Ready
        </h3>

        <a
        href="${url}"
        download="merged.pdf">

          <button class="tool-btn">
            Download PDF
          </button>

        </a>
      `;
    }

  </script>

</body>
</html>
